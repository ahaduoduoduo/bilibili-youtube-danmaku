<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>B站弹幕设置</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <!-- 非YouTube页面的简化界面 -->
        <div class="simple-container" id="simple-container" style="display: none">
            <div class="simple-content">
                <h2>当前不是 Youtube 页面哦</h2>
                <!-- 社交图标区域 -->
                <div class="social-icons" id="social-icons-simple" style="display: none"></div>
                <button id="open-youtube-btn" class="youtube-btn">打开 YouTube</button>
            </div>
        </div>

        <!-- 夸克网盘专用界面 -->
        <div class="container" id="quark-container" style="display: none">
            <h1>B2Y 弹幕助手</h1>

            <!-- 社交图标区域 -->
            <div class="social-icons" id="social-icons-quark" style="display: none"></div>

            <!-- 平台标识 -->
            <div class="channel-info" id="quark-platform-info">
                <div class="channel-header">
                    <div class="channel-details" style="flex: 1">
                        <h3 style="display: flex; align-items: center; gap: 8px">
                            <span style="font-size: 18px">📺</span>
                            夸克网盘
                        </h3>
                        <p
                            id="quark-video-title"
                            style="margin-top: 4px; color: #666; font-size: 12px"
                        ></p>
                    </div>
                </div>
            </div>

            <!-- 已匹配视频 -->
            <div class="quark-match-card" id="quark-match-card" style="display: none">
                <div class="quark-match-status">已匹配</div>
                <div class="quark-match-main">
                    <img id="quark-match-cover" class="quark-match-cover" src="" alt="" />
                    <div class="quark-match-content">
                        <div class="quark-match-title" id="quark-match-title"></div>
                        <div class="quark-match-meta">
                            <span id="quark-match-author"></span>
                            <span id="quark-match-ratio"></span>
                        </div>
                    </div>
                </div>
                <div class="quark-match-actions">
                    <button type="button" id="quark-view-bilibili-btn">在 B 站查看</button>
                    <button type="button" id="quark-manual-match-btn">手动匹配</button>
                </div>
            </div>

            <!-- 手动输入区域 -->
            <div class="manual-input" id="quark-manual-input">
                <div class="input-group">
                    <label for="quark-bilibili-url">输入B站视频链接：</label>
                    <input
                        type="text"
                        id="quark-bilibili-url"
                        placeholder="https://www.bilibili.com/video/BVxxxxxx"
                    />
                    <div class="button-group">
                        <button id="quark-download-btn">下载弹幕</button>
                    </div>
                </div>
            </div>

            <div class="status-bar" id="quark-status-bar"></div>

            <div class="danmaku-info" id="quark-danmaku-info"></div>

            <div class="controls">
                <div class="control-group">
                    <label class="toggle">
                        <span class="toggle-label">弹幕开关</span>
                        <input type="checkbox" id="quark-enable-danmaku" checked />
                        <span class="toggle-slider" aria-hidden="true"></span>
                    </label>
                </div>

                <div class="control-group">
                    <label class="toggle">
                        <span class="toggle-label">自动下载弹幕</span>
                        <input type="checkbox" id="quark-auto-download" />
                        <span class="toggle-slider" aria-hidden="true"></span>
                    </label>
                </div>

                <div class="control-group" id="quark-match-threshold-group" style="display: none">
                    <label for="quark-match-threshold">标题匹配度：</label>
                    <input
                        type="range"
                        id="quark-match-threshold"
                        min="50"
                        max="100"
                        value="90"
                        step="5"
                    />
                    <span id="quark-match-threshold-value">90%</span>
                    <p class="control-hint">大于匹配度的弹幕会自动下载</p>
                </div>

                <div class="control-group" id="quark-multi-match-group" style="display: none">
                    <label>多匹配处理方式：</label>
                    <div class="display-area-buttons quark-multi-match-buttons">
                        <button
                            type="button"
                            class="display-area-btn quark-multi-match-btn active"
                            data-value="mostDanmaku"
                        >
                            弹幕最多
                        </button>
                        <button
                            type="button"
                            class="display-area-btn quark-multi-match-btn"
                            data-value="manualSelect"
                        >
                            弹出选择
                        </button>
                    </div>
                    <p class="control-hint">多个结果达到匹配度时的处理方式</p>
                </div>

                <div class="control-group">
                    <label for="quark-time-offset">时间轴偏移：</label>
                    <div class="time-offset-controls">
                        <input
                            type="range"
                            id="quark-time-offset"
                            min="-60"
                            max="60"
                            value="0"
                            step="0.5"
                        />
                        <div class="time-offset-manual">
                            <input
                                type="number"
                                id="quark-time-offset-input"
                                value="0"
                                step="0.5"
                                placeholder="0"
                            />
                            <span class="time-unit">s</span>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label for="quark-opacity">透明度：</label>
                    <input type="range" id="quark-opacity" min="0" max="100" value="100" step="5" />
                    <span id="quark-opacity-value">100%</span>
                </div>

                <div class="control-group">
                    <label for="quark-font-size">字体大小：</label>
                    <input
                        type="range"
                        id="quark-font-size"
                        min="16"
                        max="48"
                        value="24"
                        step="2"
                    />
                    <span id="quark-font-size-value">24px</span>
                </div>

                <div class="control-group">
                    <label for="quark-speed">滚动速度：</label>
                    <input type="range" id="quark-speed" min="0.5" max="2" value="1" step="0.1" />
                    <span id="quark-speed-value">1.0x</span>
                </div>

                <div class="control-group">
                    <label for="quark-track-spacing">弹幕垂直间距：</label>
                    <input
                        type="range"
                        id="quark-track-spacing"
                        min="0"
                        max="20"
                        value="8"
                        step="1"
                    />
                    <span id="quark-track-spacing-value">8px</span>
                </div>

                <div class="control-group">
                    <label>显示区域：</label>
                    <div class="display-area-buttons">
                        <button
                            type="button"
                            class="display-area-btn quark-display-area-btn"
                            data-value="10"
                        >
                            10%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn quark-display-area-btn"
                            data-value="25"
                        >
                            25%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn quark-display-area-btn"
                            data-value="50"
                        >
                            50%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn quark-display-area-btn"
                            data-value="75"
                        >
                            75%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn quark-display-area-btn active"
                            data-value="100"
                        >
                            100%
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="quark-filter-level">智能过滤：</label>
                    <input
                        type="range"
                        id="quark-filter-level"
                        min="0"
                        max="10"
                        value="0"
                        step="1"
                    />
                    <span id="quark-filter-level-value">0（显示全部）</span>
                </div>
            </div>

            <!-- 弹幕列表 -->
            <div class="danmaku-list-container" id="quark-danmaku-list-container">
                <div class="danmaku-list-header">
                    <div class="danmaku-list-title">
                        <h3>弹幕列表</h3>
                    </div>
                    <input type="text" id="quark-danmaku-search" placeholder="搜索弹幕..." />
                </div>
                <div class="danmaku-list" id="quark-danmaku-list"></div>
            </div>
        </div>

        <!-- 原有的完整功能界面 -->
        <div class="container" id="main-container">
            <h1>B站弹幕 → YouTube</h1>

            <!-- 社交图标区域 -->
            <div class="social-icons" id="social-icons" style="display: none"></div>

            <!-- YouTube频道信息展示 -->
            <div class="channel-info" id="channel-info" style="display: none">
                <div class="channel-header">
                    <img id="channel-avatar" src="" alt="频道头像" class="channel-avatar" />
                    <div class="channel-details">
                        <h3 id="channel-name">频道名称</h3>
                        <p id="channel-id">频道ID</p>
                    </div>
                    <div class="association-status" id="association-status">
                        <span class="status-text">未关联</span>
                        <div class="associated-info" id="associated-info" style="display: none">
                            <span class="associated-icon"></span>
                            <span class="associated-uid" id="associated-uid">已关联：</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- YouTube 已匹配视频 -->
            <div class="youtube-match-card" id="youtube-match-card" style="display: none">
                <div class="youtube-match-status">已匹配</div>
                <div class="youtube-match-main">
                    <img id="youtube-match-cover" class="youtube-match-cover" src="" alt="" />
                    <div class="youtube-match-content">
                        <div class="youtube-match-title" id="youtube-match-title"></div>
                        <div class="youtube-match-meta">
                            <span id="youtube-match-author"></span>
                            <span id="youtube-match-ratio"></span>
                        </div>
                    </div>
                </div>
                <div class="youtube-match-actions">
                    <button type="button" id="youtube-view-bilibili-btn">在 B 站查看</button>
                    <button type="button" id="youtube-manual-match-btn">手动匹配</button>
                </div>
            </div>

            <!-- B站UP主关联区域 -->
            <div class="association-section" id="association-section" style="display: none">
                <div class="association-header">
                    <h3>关联B站UP主</h3>
                </div>
                <div class="association-input">
                    <input
                        type="text"
                        id="bilibili-space-url"
                        placeholder="https://space.bilibili.com/339233162"
                    />
                    <button id="smart-search-btn" class="smart-search-btn" title="智能搜索并关联">
                        智能搜索
                    </button>
                    <button id="associate-btn">关联</button>
                </div>
                <div class="association-info" id="association-info" style="display: none">
                    <p>已关联：<span id="associated-up-name"></span></p>
                    <button id="auto-search-btn">自动搜索弹幕</button>
                    <button id="unassociate-btn">取消关联</button>
                </div>
            </div>

            <!-- 自动搜索结果 -->
            <div class="search-results" id="search-results" style="display: none">
                <div class="youtube-search-header">
                    <h3>B站弹幕</h3>
                    <div class="youtube-search-box">
                        <input
                            type="text"
                            id="youtube-search-input"
                            placeholder="输入视频标题搜索"
                        />
                        <button type="button" id="youtube-search-btn" title="搜索">搜索</button>
                    </div>
                </div>
                <div id="search-status"></div>
                <div id="search-list"></div>
            </div>

            <!-- 手动输入区域 -->
            <div class="manual-input" id="manual-input">
                <div class="input-group">
                    <label for="bilibili-url" id="bilibili-url-label"
                        >或手动输入B站视频链接：</label
                    >
                    <input
                        type="text"
                        id="bilibili-url"
                        placeholder="https://www.bilibili.com/video/BVxxxxxx"
                    />
                    <div class="button-group">
                        <button id="view-bilibili-btn" style="display: none">在B站查看</button>
                        <button id="view-bilibili-space-btn" style="display: none">
                            查看 B站空间
                        </button>
                        <button id="download-btn">手动匹配</button>
                    </div>
                </div>
            </div>

            <div class="status-bar" id="status-bar"></div>

            <div class="controls">
                <div class="control-group">
                    <label class="toggle">
                        <span class="toggle-label">弹幕开关</span>
                        <input type="checkbox" id="enable-danmaku" checked />
                        <span class="toggle-slider" aria-hidden="true"></span>
                    </label>
                </div>

                <div class="control-group" id="youtube-match-threshold-group">
                    <label for="youtube-match-threshold">标题匹配度：</label>
                    <input
                        type="range"
                        id="youtube-match-threshold"
                        min="50"
                        max="100"
                        value="90"
                        step="5"
                    />
                    <span id="youtube-match-threshold-value">90%</span>
                    <p class="control-hint">大于匹配度的弹幕会自动下载</p>
                </div>

                <div class="control-group" id="youtube-multi-match-group">
                    <label>多匹配处理方式：</label>
                    <div class="display-area-buttons youtube-multi-match-buttons">
                        <button
                            type="button"
                            class="display-area-btn youtube-multi-match-btn active"
                            data-value="mostDanmaku"
                        >
                            弹幕最多
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-multi-match-btn"
                            data-value="manualSelect"
                        >
                            弹出选择
                        </button>
                    </div>
                    <p class="control-hint">多个结果达到匹配度时的处理方式</p>
                </div>

                <div class="control-group" id="youtube-match-mode-group">
                    <label>识别模式：</label>
                    <div class="display-area-buttons youtube-match-mode-buttons">
                        <button
                            type="button"
                            class="display-area-btn youtube-match-mode-btn active"
                            data-value="autoDownload"
                        >
                            新版模式
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-match-mode-btn"
                            data-value="legacy"
                        >
                            旧版模式
                        </button>
                    </div>
                    <p class="control-hint">新版按视频标题搜索 B 站，旧版使用 UP 关联和空间搜索</p>
                </div>

                <div class="control-group">
                    <label for="time-offset"
                        >时间轴偏移：
                        <button
                            type="button"
                            id="time-offset-reset"
                            title="重置为0"
                            style="display: none"
                        >
                            ⟲
                        </button>
                    </label>
                    <div class="time-offset-controls">
                        <input
                            type="range"
                            id="time-offset"
                            min="-60"
                            max="60"
                            value="0"
                            step="0.1"
                        />
                        <div class="time-offset-manual">
                            <input
                                type="number"
                                id="time-offset-input"
                                value="0"
                                step="0.1"
                                placeholder="0"
                            />
                            <span class="time-unit">s</span>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label for="opacity">透明度：</label>
                    <input type="range" id="opacity" min="0" max="100" value="100" step="5" />
                    <span id="opacity-value">100%</span>
                </div>

                <div class="control-group">
                    <label for="font-size">字体大小：</label>
                    <input type="range" id="font-size" min="16" max="48" value="24" step="2" />
                    <span id="font-size-value">24px</span>
                </div>

                <div class="control-group">
                    <label for="speed">滚动速度：</label>
                    <input type="range" id="speed" min="0.5" max="2" value="1" step="0.1" />
                    <span id="speed-value">1.0x</span>
                </div>

                <div class="control-group">
                    <label for="track-spacing">弹幕垂直间距：</label>
                    <input type="range" id="track-spacing" min="0" max="20" value="8" step="1" />
                    <span id="track-spacing-value">8px</span>
                </div>

                <div class="control-group">
                    <label>显示区域：</label>
                    <div class="display-area-buttons">
                        <button
                            type="button"
                            class="display-area-btn youtube-display-area-btn"
                            data-value="10"
                        >
                            10%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-display-area-btn"
                            data-value="25"
                        >
                            25%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-display-area-btn"
                            data-value="50"
                        >
                            50%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-display-area-btn"
                            data-value="75"
                        >
                            75%
                        </button>
                        <button
                            type="button"
                            class="display-area-btn youtube-display-area-btn active"
                            data-value="100"
                        >
                            100%
                        </button>
                    </div>
                </div>

                <div class="control-group">
                    <label for="weight-threshold">智能过滤：</label>
                    <input type="range" id="weight-threshold" min="0" max="10" value="5" step="1" />
                    <span id="weight-threshold-value">5（过滤等级）</span>
                </div>
            </div>

            <div class="danmaku-info" id="danmaku-info"></div>

            <div class="danmaku-list-container" id="danmaku-list-container">
                <div class="danmaku-list-header">
                    <div class="danmaku-list-title">
                        <h3>弹幕列表</h3>
                    </div>
                    <input type="text" id="danmaku-search" placeholder="搜索弹幕..." />
                </div>
                <div class="danmaku-list" id="danmaku-list"></div>
            </div>
        </div>
        <script type="module" src="../../utils/channelAssociation.js"></script>
        <script type="module" src="./popup.js"></script>
    </body>
</html>
